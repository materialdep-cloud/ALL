    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入專門為英數字設計的超圓潤胖嘟嘟 Q 版字型 "Comfortaa" -->
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 全局字體設定：英文數字用極圓 Comfortaa，中文自動對齊微軟正黑/蘋方極粗體，100%不缺字 */
        .cute-font {
            font-family: 'Comfortaa', "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            font-weight: 900;
        }

        /* 可愛風的波點與漸層背景 */
        body {
            background-color: #f3faf4; 
            background-image: 
                radial-gradient(circle at 100% 0%, #e2f5e5 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #e2f5e5 0%, transparent 50%),
                radial-gradient(#c2ebd0 3px, transparent 3px);
            background-size: 100% 100%, 100% 100%, 40px 40px;
            background-attachment: fixed;
        }

        /* 圓形 Q 版按鈕的立體果凍樣式 */
        .q-button {
            aspect-ratio: 1 / 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 
                inset -8px -8px 16px rgba(0, 0, 0, 0.08), 
                inset 8px 8px 16px rgba(255, 255, 255, 0.6), 
                0px 10px 20px rgba(0, 0, 0, 0.06); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-decoration: none;
            overflow: hidden;
            border: 6px solid #ffffff;
        }

        .q-button:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 
                inset -8px -8px 16px rgba(0, 0, 0, 0.08),
                inset 8px 8px 16px rgba(255, 255, 255, 0.7),
                0px 20px 30px rgba(0, 0, 0, 0.12);
        }

        /* 按鈕上方的高光反射（果凍感） */
        .glossy-light {
            position: absolute;
            top: 6%;
            left: 15%;
            width: 45%;
            height: 22%;
            background: linear-gradient(180deg, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0) 100%);
            border-radius: 9999px;
            transform: rotate(-12deg);
            pointer-events: none;
            z-index: 10;
        }

        /* 貼紙浮動動畫 */
        .sticker-deco {
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* 白雲輕飄動畫 */
        .cloud-flow {
            animation: cloud 8s ease-in-out infinite;
        }
        @keyframes cloud {
            0% { transform: translateX(0px); }
            50% { transform: translateX(8px); }
            100% { transform: translateX(0px); }
        }
    </style>
</head>
