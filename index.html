<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠園生活 GreenLiving - 工具導覽</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 可愛風的波點與漸層背景 */
        body {
            background-color: #e8f5e9; /* 柔和的淺綠色底 */
            background-image: 
                radial-gradient(circle at 100% 0%, #c8e6c9 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #c8e6c9 0%, transparent 50%),
                radial-gradient(#a5d6a7 2px, transparent 2px);
            background-size: 100% 100%, 100% 100%, 40px 40px;
            background-attachment: fixed;
        }

        /* 微調 Q 版字體與平滑動畫 */
        .cute-font {
            font-family: "Nunito", "PingFang TC", "Microsoft JhengHei", "Comic Sans MS", sans-serif;
        }

        /* 圓形 Q 版按鈕的特殊立體樣式 */
        .q-button {
            aspect-ratio: 1 / 1; /* 保持正方形，再搭配 rounded-full 變成圓形 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 
                inset -8px -8px 16px rgba(0, 0, 0, 0.1), /* 內陰影增強立體感 */
                inset 8px 8px 16px rgba(255, 255, 255, 0.5), /* 內高光 */
                6px 6px 15px rgba(0, 0, 0, 0.15); /* 外陰影 */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 彈跳效果的貝茲曲線 */
            text-decoration: none;
            overflow: hidden;
            border: 4px solid rgba(255,255,255,0.8);
        }

        .q-button:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 
                inset -8px -8px 16px rgba(0, 0, 0, 0.1),
                inset 8px 8px 16px rgba(255, 255, 255, 0.6),
                10px 15px 25px rgba(0, 0, 0, 0.2);
        }

        /* 按鈕上方的高光反射 */
        .glossy-light {
            position: absolute;
            top: 5%;
            left: 15%;
            width: 40%;
            height: 20%;
            background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 100%);
            border-radius: 9999px;
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: 10;
        }

        /* 標題區域裝飾 */
        .header-deco {
            font-size: 2.5rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
    <!-- 引入 Google Fonts: Nunito 讓英文字體更圓潤可愛 -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen cute-font selection:bg-green-300 py-10 px-4 md:px-8">

    <div class="max-w-5xl mx-auto bg-white/60 backdrop-blur-md rounded-[3rem] p-8 shadow-2xl border-4 border-green-200">
        
        <!-- 標題區域 (模擬圖片上方的可愛農場場景) -->
        <div class="text-center mb-12">
            <div class="flex justify-center items-end gap-2 mb-4">
                <span class="header-deco" style="animation-delay: 0s;">🧑‍🌾</span>
                <span class="header-deco" style="animation-delay: 0.2s;">👩‍🌾</span>
                <span class="header-deco text-4xl" style="animation-delay: 0.4s;">🐄</span>
                <span class="header-deco text-4xl" style="animation-delay: 0.6s;">🐖</span>
                <span class="header-deco" style="animation-delay: 0.8s;">🌱</span>
            </div>
            
            <div class="inline-block px-10 py-3 rounded-full bg-white border-4 border-green-400 shadow-lg transform -rotate-1 hover:rotate-1 transition-transform duration-300">
                <h1 class="text-4xl md:text-5xl font-black text-green-800 tracking-wider">
                    greenliving
                </h1>
                <h2 class="text-2xl md:text-3xl font-bold text-green-600 mt-1">
                    綠園生活
                </h2>
            </div>

            <div class="flex justify-center items-end gap-2 mt-4">
                <span class="header-deco" style="animation-delay: 1s;">🥬</span>
                <span class="header-deco" style="animation-delay: 1.2s;">🥕</span>
                <span class="header-deco" style="animation-delay: 1.4s;">🥔</span>
                <span class="header-deco" style="animation-delay: 1.6s;">🚜</span>
            </div>
        </div>

        <!-- 圓形工具按鈕網格 -->
        <!-- 順序：DM -> 理貨 -> 二廠 -> 系統 -> LINE -> 川聖 -> 邱薏芬 -> 產品 -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6 md:gap-10 max-w-4xl mx-auto">
            
            <!-- 1. DM (藍色) -->
            <a href="https://materialdep-cloud.github.io/DM/" target="_blank" rel="noopener noreferrer"
               class="q-button bg-[#93c5fd] rounded-full group">
                <div class="glossy-light"></div>
                <div class="text-6xl md:text-7xl mb-2 drop-shadow-md transition-transform duration-300 group-hover:scale-110 group-hover:rotate-6 z-20">
                    📰
                </div>
                <h3 class="text-lg md:text-xl font-bold text-blue-900 px-4 text-center leading-tight z-20">
                    DM
                </h3>
            </a>

            <!-- 2. 理貨倉補貨安全庫存 (綠色) -->
            <a href="https://materialdep-cloud.github.io/Restock/" target="_blank" rel="noopener noreferrer"
               class="q-button bg-[#86efac] rounded-full group">
                <div class="glossy-light"></div>
                <div class="text-6xl md:text-7xl mb-2 drop-shadow-md transition-transform duration-300 group-hover:scale-110 group-hover:-rotate-6 z-20">
                    🏭
                </div>
                <h3 class="text-sm md:text-base font-bold text-green-900 px-2 text-center leading-tight z-20">
                    理貨倉<br>補貨安全庫存
                </h3>
            </a>

            <!-- 3. 二廠包材補貨安全庫存 (蒂芬妮綠/湖水綠) -->
            <a href="https://materialdep-cloud.github.io/Restock2/" target="_blank" rel="noopener noreferrer"
               class="q-button bg-[#6ee7b7] rounded-full group">
                <div class="glossy-light"></div>
                <div class="text-6xl md:text-7xl mb-2 drop-shadow-md transition-transform duration-300 group-hover:scale-110 group-hover:rotate-6 z-20">
                    🎁
                </div>
                <h3 class="text-sm md:text-base font-bold text-teal-900 px-2 text-center leading-tight z-20">
                    二廠包材<br>補貨安全庫存
                </h3>
            </a>

            <!-- 4. 系統庫存 (紫色) -->
            <a href="https://materialdep-cloud.github.io/Real-time-inventory/" target="_blank" rel="noopener noreferrer"
               class="q-button bg-[#c4b5fd] rounded-full group">
                <div class="glossy-light"></div>
                <div class="text-6xl md:text-7xl mb-2 drop-shadow-md transition-transform duration-300 group-hover:scale-110 group-hover:-rotate-6 z-20">
                    🖥️
                </div>
                <h3 class="text-lg md:text-xl font-bold text-purple-900 px-4 text-center leading-tight z-20">
                    系統庫存
                </h3>
            </a>

            <!-- 5. LINE派車系統 (淺綠色) -->
            <a href="https://materialdep-cloud.github.io/LINE/" target="_blank" rel="noopener noreferrer"
               class="q-button bg-[#bbf7d0] rounded-full group">
                <div class="glossy-light"></div>
                <div class="text-6xl md:text-7xl mb-2 drop-shadow-md transition-transform duration-300 group-hover:scale-110 group-hover:rotate-6 z-20">
                    🚚
                </div>
                <h3 class="text-lg md:text-xl font-bold text-green-900 px-4 text-center leading-tight z-20">
                    LINE派車系統
                </h3>
            </a>

            <!-- 6. 生菜重量計算器 - 川聖 (橘色) -->
            <a href="https://materialdep-cloud.github.io/lettuce-calculator_-1/" target="_blank" rel="noopener noreferrer"
               class="q-button bg-[#fdba74] rounded-full group">
                <div class="glossy-light"></div>
                <div class="text-6xl md:text-7xl mb-2 drop-shadow-md transition-transform duration-300 group-hover:scale-110 group-hover:-rotate-6 z-20">
                    🥬
                </div>
                <h3 class="text-sm md:text-base font-bold text-orange-900 px-2 text-center leading-tight z-20">
                    生菜重量<br>川聖
                </h3>
            </a>

            <!-- 7. 生菜重量計算器 - 邱薏芬 (黃色) -->
            <a href="https://materialdep-cloud.github.io/lettuce-calculator/" target="_blank" rel="noopener noreferrer"
               class="q-button bg-[#fde047] rounded-full group">
                <div class="glossy-light"></div>
                <div class="text-6xl md:text-7xl mb-2 drop-shadow-md transition-transform duration-300 group-hover:scale-110 group-hover:rotate-6 z-20">
                    🥗
                </div>
                <h3 class="text-sm md:text-base font-bold text-yellow-900 px-2 text-center leading-tight z-20">
                    生菜重量<br>邱薏芬
                </h3>
            </a>

            <!-- 8. 產品箱重量計算 (橘紅色) -->
            <a href="https://materialdep-cloud.github.io/-weight/" target="_blank" rel="noopener noreferrer"
               class="q-button bg-[#fca5a5] rounded-full group">
                <div class="glossy-light"></div>
                <div class="text-6xl md:text-7xl mb-2 drop-shadow-md transition-transform duration-300 group-hover:scale-110 group-hover:-rotate-6 z-20">
                    ⚖️
                </div>
                <h3 class="text-sm md:text-base font-bold text-red-900 px-2 text-center leading-tight z-20">
                    產品箱<br>重量計算
                </h3>
            </a>

        </div>

        <!-- 底部裝飾條 -->
        <div class="mt-16 border-t-4 border-green-200 pt-6">
            <div class="flex flex-col md:flex-row justify-center items-center gap-6 text-green-700 font-bold text-lg">
                <div class="flex items-center gap-2 hover:text-green-900 cursor-pointer transition-colors">
                    <span class="text-2xl">🖱️</span> 我們的工具
                </div>
                <div class="hidden md:block text-green-300">|</div>
                <a href="#" class="flex items-center gap-2 hover:text-green-900 cursor-pointer transition-colors">
                    <span class="text-2xl">☁️</span> 綠園生活 Cloud
                </a>
                <div class="hidden md:block text-green-300">|</div>
                <div class="flex items-center gap-2 hover:text-green-900 cursor-pointer transition-colors">
                    <span class="text-2xl">⚙️</span> 設定
                </div>
            </div>
            <p class="text-center text-green-500/80 text-sm mt-4">
                © <span id="current-year"></span> 綠園生活 GreenLiving All Rights Reserved.
            </p>
        </div>

    </div>

    <script>
        // 動態獲取當前年份
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
