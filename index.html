<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠園生活 GreenLiving - 工具導覽</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 可愛風的波點背景 */
        body {
            background-color: #f4fbf4;
            background-image: radial-gradient(#dcfce7 3px, transparent 3px);
            background-size: 40px 40px;
        }
        /* 微調 Q 版字體與平滑動畫 */
        .cute-font {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
        .glossy-light {
            position: absolute;
            top: 0.5rem;
            left: 1rem;
            width: 3rem;
            height: 1rem;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 9999px;
            transform: rotate(-15deg);
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen cute-font selection:bg-green-200 py-12 px-6">

    <div class="max-w-6xl mx-auto">
        
        <!-- 標題區域 -->
        <div class="text-center mb-16 animate-bounce" style="animation-duration: 3s;">
            <div class="inline-block bg-white px-8 py-4 rounded-full border-4 border-green-300 shadow-lg">
                <h1 class="text-4xl md:text-5xl font-black text-green-700 tracking-wide flex items-center justify-center gap-4">
                    <span class="text-5xl">🌿</span>
                    綠園生活
                    <span class="text-5xl">🚜</span>
                </h1>
                <p class="text-green-500 font-bold mt-2 text-lg uppercase tracking-widest">
                    GreenLiving Tools
                </p>
            </div>
        </div>

        <!-- 工具按鈕網格 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            
            <!-- 卡片 1: DM -->
            <a href="https://materialdep-cloud.github.io/DM/" target="_blank" rel="noopener noreferrer"
               class="relative group block overflow-hidden rounded-[2.5rem] border-4 border-pink-300 bg-pink-100 transition-all duration-300 ease-out hover:-translate-y-3 hover:scale-105 shadow-md hover:shadow-2xl hover:shadow-pink-200 p-6 text-center">
                <div class="glossy-light"></div>
                <div class="inline-block px-3 py-1 rounded-full text-xs font-bold mb-4 bg-pink-200 text-pink-700 transition-transform duration-300 group-hover:scale-110">
                    行銷設計
                </div>
                <div class="text-7xl mb-4 drop-shadow-md transition-transform duration-300 group-hover:rotate-12 group-hover:scale-110">
                    🎨
                </div>
                <h2 class="text-xl font-bold text-pink-800 leading-snug">
                    DM
                </h2>
                <div class="mt-4 text-sm font-bold opacity-0 transition-opacity duration-300 text-pink-800 group-hover:opacity-100">
                    點擊開啟 👉
                </div>
            </a>

            <!-- 卡片 2: 理貨倉補貨安全庫存 -->
            <a href="https://materialdep-cloud.github.io/Restock/" target="_blank" rel="noopener noreferrer"
               class="relative group block overflow-hidden rounded-[2.5rem] border-4 border-blue-300 bg-blue-100 transition-all duration-300 ease-out hover:-translate-y-3 hover:scale-105 shadow-md hover:shadow-2xl hover:shadow-blue-200 p-6 text-center">
                <div class="glossy-light"></div>
                <div class="inline-block px-3 py-1 rounded-full text-xs font-bold mb-4 bg-blue-200 text-blue-700 transition-transform duration-300 group-hover:scale-110">
                    庫存管理
                </div>
                <div class="text-7xl mb-4 drop-shadow-md transition-transform duration-300 group-hover:rotate-12 group-hover:scale-110">
                    🏢
                </div>
                <h2 class="text-xl font-bold text-blue-800 leading-snug">
                    理貨倉補貨安全庫存
                </h2>
                <div class="mt-4 text-sm font-bold opacity-0 transition-opacity duration-300 text-blue-800 group-hover:opacity-100">
                    點擊開啟 👉
                </div>
            </a>

            <!-- 卡片 3: 二廠包材補貨安全庫存 -->
            <a href="https://materialdep-cloud.github.io/Restock2/" target="_blank" rel="noopener noreferrer"

                <div class="glossy-light"></div>
                <div class="inline-block px-3 py-1 rounded-full text-xs font-bold mb-4 bg-blue-200 text-blue-700 transition-transform duration-300 group-hover:scale-110">
                    庫存管理
                </div>
                <div class="text-7xl mb-4 drop-shadow-md transition-transform duration-300 group-hover:rotate-12 group-hover:scale-110">

                <div class="glossy-light"></div>
                <div class="inline-block px-3 py-1 rounded-full text-xs font-bold mb-4 bg-emerald-200 text-emerald-700 transition-transform duration-300 group-hover:scale-110">
                    物流派車

                <div class="text-7xl mb-4 drop-shadow-md transition-transform duration-300 group-hover:rotate-12 group-hover:scale-110">
                    🚛

                <h2 class="text-xl font-bold text-emerald-800 leading-snug">
                    LINE派車系統
                </h2>
                <div class="mt-4 text-sm font-bold opacity-0 transition-opacity duration-300 text-emerald-800 group-hover:opacity-100">
                    點擊開啟 👉
                </div>
            </a>

            <!-- 卡片 5: 系統庫存 -->

               class="relative group block overflow-hidden rounded-[2.5rem] border-4 border-purple-300 bg-purple-100 transition-all duration-300 ease-out hover:-translate-y-3 hover:scale-105 shadow-md hover:shadow-2xl hover:shadow-purple-200 p-6 text-center">
                <div class="glossy-light"></div>

                <div class="inline-block px-3 py-1 rounded-full text-xs font-bold mb-4 bg-lime-200 text-lime-700 transition-transform duration-300 group-hover:scale-110">

                </div>
                <div class="text-7xl mb-4 drop-shadow-md transition-transform duration-300 group-hover:rotate-12 group-hover:scale-110">
                    🥬

                <h2 class="text-xl font-bold text-lime-800 leading-snug">
                    生菜重量計算器 - 川聖
                </h2>
                <div class="mt-4 text-sm font-bold opacity-0 transition-opacity duration-300 text-lime-800 group-hover:opacity-100">
                    點擊開啟 👉
                </div>
            </a>

            <!-- 卡片 8: 生菜重量計算器-邱薏芬 -->
            <a href="https://materialdep-cloud.github.io/lettuce-calculator/" target="_blank" rel="noopener noreferrer"
               class="relative group block overflow-hidden rounded-[2.5rem] border-4 border-lime-300 bg-lime-100 transition-all duration-300 ease-out hover:-translate-y-3 hover:scale-105 shadow-md hover:shadow-2xl hover:shadow-lime-200 p-6 text-center">
                <div class="glossy-light"></div>
                <div class="inline-block px-3 py-1 rounded-full text-xs font-bold mb-4 bg-lime-200 text-lime-700 transition-transform duration-300 group-hover:scale-110">
                    重量計算
                </div>
                <div class="text-7xl mb-4 drop-shadow-md transition-transform duration-300 group-hover:rotate-12 group-hover:scale-110">

                    生菜重量計算器 - 邱薏芬

                <div class="mt-4 text-sm font-bold opacity-0 transition-opacity duration-300 text-lime-800 group-hover:opacity-100">
                    點擊開啟 👉
                </div>
            </a>

        </div>

        <!-- 底部裝飾 -->
        <div class="mt-20 text-center text-green-600/60 font-bold flex flex-col items-center justify-center gap-2">
            <div class="flex gap-2 text-2xl">
                🌱 🌼 🐛 🌻 🐌
            </div>
            <p>© <span id="current-year"></span> 綠園生活 GreenLiving</p>
        </div>
    </div>

    <script>
        // 動態獲取當前年份
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
